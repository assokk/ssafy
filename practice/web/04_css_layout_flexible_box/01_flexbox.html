<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      height: 500px;
      border: 1px solid black;
      display: flex;

      /* flex-direction - 주 축의 방향을 설정합니다. 기본값은 row입니다. */
      flex-direction: row;
      /* flex-direction: column; */
      /* flex-direction: row-reverse; */
      /* flex-direction: column-reverse; */

      /* flex-wrap - 아이템이 컨테이너의 크기를 초과할 때 줄 바꿈 여부를 설정합니다. 기본값은 nowrap입니다. */
      /* flex-wrap: nowrap; */
      flex-wrap: wrap;
      /* flex-wrap: wrap-reverse; */

      /* justify-content - 주 축을 따라 아이템을 정렬하는 방법을 설정합니다. 기본값은 flex-start입니다. */
      justify-content: flex-start;
      /* justify-content: center; */
      /* justify-content: flex-end; */

      /* align-content - 여러 줄의 아이템이 있을 때, 교차 축을 따라 아이템을 정렬하는 방법을 설정합니다. 기본값은 stretch입니다. */
      /* align-content: flex-start; */
      /* align-content: center; */
      /* align-content: flex-end; */

      /* align-items - 교차 축을 따라 아이템을 정렬하는 방법을 설정합니다. 기본값은 stretch입니다. */
      /* align-items: flex-start; */
      /* align-items: center; */
      /* align-items: flex-end; */
    }

    .post {
      background-color: grey;
      border: 1px solid black;
      margin: 0.5rem;
      padding: 0.5rem;
    }

    .item1 {
      /* align-self: center; */
    }

    .item2 {
      /* align-self: flex-end; */
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="post item1">
      <h2>Post Title 1</h2>
      <p>Post Content 1</p>
    </div>
    <div class="post item2">
      <h2>Post Title 2</h2>
      <p>Post Content 2</p>
    </div>
    <div class="post item3">
      <h2>Post Title 3</h2>
      <p>Post Content 3</p>
    </div>
    <div class="post item4">
      <h2>Post Title 4</h2>
      <p>Post Content 4</p>
    </div>
  </div>

</body>

</html>
