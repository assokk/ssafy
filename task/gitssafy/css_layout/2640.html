<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .profile-container {
      width: 350px;
      height: 600px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid black;
    }

    .profile-header {
      position: relative;
      width: 100%;
      height: 60%;
      display: flex;
      margin-bottom: 10px;
    }
   
    .profile-header img {
      width: 100%;
    }

    .profile-name {
      position: absolute;
      width: 100%;
      margin: 0;
      padding: 3px;
      font-size: 30px;
      font-weight: bold;
      text-align: center;
      background-color: rgba(253, 193, 153, 0.7);
      bottom: 0;
    }

    .profile-text {
      font-size: 17px;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <img src="profile.png" alt="Profile Image">
      <p class="profile-name">Name</p>
    </div>
    <p class="profile-text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci unde officiis ad nostrum. Laboriosam mollitia similique provident fuga tenetur saepe sit, amet eaque neque eius quaerat expedita ea illum veniam.</p>
  </div>
</body>
</html>
