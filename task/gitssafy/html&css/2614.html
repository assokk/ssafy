<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="large-box" style="width:400px; height:400px; border:2px solid black;">
    <div class="medium-box" style="width:200px; height:200px; border:2px dashed red;">
      <div class="small-box" style="width:100px; height:100px; border:2px dotted blue;">
      </div>
    </div>
  </div>
</body>
</html>
